# =============================================
# Cloudflare Worker + D1 Configuration
# Project: Baccarat Master Guide
# =============================================

name = "baccaratmaster"
main = "worker.ts"
compatibility_date = "2024-12-01"

# =============================================
# D1 Database Binding
# =============================================
[[d1_databases]]
binding = "DB"
database_name = "baccarat-master-db"
database_id = "1ec6974a-786d-44b3-bb06-dcdd738924ed"  # ← ใส่ ID จริงที่ได้จากขั้นตอน 6

# =============================================
# Durable Objects for WebSockets
# =============================================
[[durable_objects.bindings]]
name = "WEBSOCKET_MANAGER"
class_name = "WebSocketManager"

[[migrations]]
tag = "v1"
new_classes = ["WebSocketManager"]

# =============================================
# Environment Variables (optional)
# =============================================
[vars]
ENVIRONMENT = "production"
