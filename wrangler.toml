# =============================================
# Cloudflare Worker + D1 Configuration
# =============================================

name = "baccarat-master-api"
main = "src/worker.ts"
compatibility_date = "2024-12-01"

# =============================================
# D1 Database Binding
# =============================================
[[d1_databases]]
binding = "DB"
database_name = "baccarat-master-db"
database_id = "1ec6974a-786d-44b3-bb06-dcdd738924ed"

# =============================================
# Environment Variables (optional)
# =============================================
[vars]
ENVIRONMENT = "production"
